<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Default video thumbnail</title>
  <desc id="desc">Fallback thumbnail shown when a video thumbnail is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" rx="32" ry="32" />
  <circle cx="1040" cy="160" r="140" fill="rgba(255,255,255,0.06)" />
  <circle cx="220" cy="600" r="220" fill="rgba(255,255,255,0.05)" />
  <rect x="110" y="120" width="660" height="400" rx="32" fill="rgba(255,255,255,0.08)" />
  <polygon points="400,250 400,390 540,320" fill="url(#accent)" />
  <rect x="110" y="560" width="500" height="28" rx="14" fill="rgba(255,255,255,0.18)" />
  <rect x="110" y="608" width="360" height="20" rx="10" fill="rgba(255,255,255,0.12)" />
  <text x="820" y="470" fill="#f8fafc" font-family="Arial, sans-serif" font-size="54" font-weight="700">
    Video Preview
  </text>
  <text x="820" y="536" fill="rgba(248,250,252,0.78)" font-family="Arial, sans-serif" font-size="28">
    Thumbnail unavailable
  </text>
</svg>
